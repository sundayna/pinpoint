<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pinpoint — 高中學測・分科備考</title>
  <meta property="og:title" content="Pinpoint — 高中學測・分科備考">
  <meta property="og:description" content="AI 學習助理，精準打到考點，幫你有效率地備考學測與分科測驗。">
  <meta property="og:url" content="https://pinpoint-brown-omega.vercel.app">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0e0e10;
      --surface: #16161a;
      --surface2: #1e1e24;
      --border: #2a2a35;
      --accent: #c8f060;
      --accent2: #7b61ff;
      --text: #e8e6df;
      --muted: #7a7880;
      --user-bubble: #1e2a14;
      --ai-bubble: #1a1a22;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Noto Serif TC', serif;
      background: var(--bg);
      color: var(--text);
      height: 100dvh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── Auth Modal ── */
    #auth-modal {
      position: fixed;
      inset: 0;
      background: rgba(14,14,16,0.97);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 100;
      backdrop-filter: blur(4px);
    }
    .auth-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 36px;
      max-width: 400px;
      width: 90%;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
    .auth-card .logo { font-size: 22px; font-weight: 600; color: var(--accent); }
    .auth-card .logo span { color: var(--text); }
    .auth-card h2 { font-size: 18px; color: var(--text); }
    .auth-card p { font-size: 13px; color: var(--muted); line-height: 1.6; }
    .auth-input {
      width: 100%;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 11px 14px;
      color: var(--text);
      font-family: 'Noto Serif TC', serif;
      font-size: 14px;
      outline: none;
      transition: border-color 0.2s;
    }
    .auth-input:focus { border-color: var(--accent); }
    .auth-input::placeholder { color: var(--muted); }
    .auth-btn {
      width: 100%;
      padding: 12px;
      border-radius: 8px;
      border: none;
      background: var(--accent);
      color: #0e0e10;
      font-family: 'Noto Serif TC', serif;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    .auth-btn:hover { opacity: 0.88; }
    .auth-btn.secondary {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text);
    }
    .google-btn {
      width: 100%;
      padding: 11px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: var(--surface2);
      color: var(--text);
      font-family: 'Noto Serif TC', serif;
      font-size: 14px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      transition: border-color 0.2s;
    }
    .google-btn:hover { border-color: var(--accent); }
    .divider {
      display: flex;
      align-items: center;
      gap: 10px;
      color: var(--muted);
      font-size: 12px;
    }
    .divider::before, .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }
    .auth-switch {
      font-size: 13px;
      color: var(--muted);
      text-align: center;
    }
    .auth-switch a {
      color: var(--accent);
      cursor: pointer;
      text-decoration: none;
    }
    .auth-error {
      font-size: 13px;
      color: #ff6b6b;
      text-align: center;
      min-height: 18px;
    }

    /* ── Header ── */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 24px;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
      flex-shrink: 0;
      gap: 12px;
    }
    .logo { font-size: 18px; font-weight: 600; color: var(--accent); }
    .logo span { color: var(--text); }
    .subject-tabs { display: flex; gap: 8px; }
    .tab {
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      padding: 4px 10px;
      border-radius: 20px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--muted);
      cursor: pointer;
      transition: all 0.2s;
      white-space: nowrap;
    }
    .tab:hover, .tab.active { border-color: var(--accent); color: var(--accent); background: rgba(200,240,96,0.06); }
    .header-right { display: flex; align-items: center; gap: 10px; flex-shrink: 0; }
    .subscribe-btn {
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      padding: 5px 12px;
      border-radius: 20px;
      background: var(--accent);
      color: #0e0e10;
      font-weight: 600;
      text-decoration: none;
      white-space: nowrap;
      transition: opacity 0.2s;
    }
    .subscribe-btn:hover { opacity: 0.85; }
    .user-btn {
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      padding: 5px 12px;
      border-radius: 20px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--muted);
      cursor: pointer;
      white-space: nowrap;
      transition: all 0.2s;
    }
    .user-btn:hover { border-color: var(--text); color: var(--text); }

    /* ── Chat ── */
    #chat {
      flex: 1;
      overflow-y: auto;
      padding: 28px 24px;
      display: flex;
      flex-direction: column;
      gap: 20px;
      scroll-behavior: smooth;
    }
    #chat::-webkit-scrollbar { width: 4px; }
    #chat::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    /* ── Welcome ── */
    #welcome {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      flex: 1;
      gap: 28px;
      text-align: center;
      padding: 40px;
      animation: fadeUp 0.5s ease;
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .welcome-title { font-size: 34px; font-weight: 600; line-height: 1.2; }
    .welcome-title .hl { color: var(--accent); }
    .welcome-sub { font-size: 14px; color: var(--muted); max-width: 400px; line-height: 1.7; }
    .quick-topics { display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; max-width: 520px; }
    .quick-topic {
      font-size: 13px;
      padding: 7px 14px;
      border-radius: 20px;
      border: 1px solid var(--border);
      background: var(--surface2);
      color: var(--text);
      cursor: pointer;
      transition: all 0.2s;
    }
    .quick-topic:hover { border-color: var(--accent); color: var(--accent); transform: translateY(-2px); }

    /* ── Messages ── */
    .msg {
      display: flex;
      flex-direction: column;
      gap: 6px;
      animation: fadeUp 0.3s ease;
      max-width: 720px;
      width: 100%;
      align-self: center;
    }
    .msg-label {
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      color: var(--muted);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      padding: 0 4px;
    }
    .msg.user .msg-label { text-align: right; }
    .bubble {
      padding: 14px 18px;
      border-radius: 12px;
      font-size: 15px;
      line-height: 1.8;
      white-space: pre-wrap;
      border: 1px solid var(--border);
    }
    .msg.user .bubble {
      background: var(--user-bubble);
      border-color: rgba(200,240,96,0.2);
      align-self: flex-end;
      max-width: 85%;
    }
    .msg.ai .bubble { background: var(--ai-bubble); align-self: flex-start; width: 100%; }
    .question-box {
      margin-top: 12px;
      padding: 14px 18px;
      border-radius: 8px;
      border-left: 3px solid var(--accent);
      background: rgba(200,240,96,0.04);
      font-size: 14px;
      line-height: 1.8;
    }
    .ceec-box {
      margin-top: 12px;
      padding: 14px 18px;
      border-radius: 8px;
      border-left: 3px solid var(--accent2);
      background: rgba(123,97,255,0.06);
      font-size: 14px;
      line-height: 1.8;
    }
    .ceec-link { color: var(--accent2); text-decoration: underline; word-break: break-all; }

    /* ── Typing ── */
    .typing { display: flex; gap: 6px; padding: 16px 18px; background: var(--ai-bubble); border: 1px solid var(--border); border-radius: 12px; width: fit-content; }
    .typing span { width: 7px; height: 7px; border-radius: 50%; background: var(--muted); animation: bounce 1.2s infinite; }
    .typing span:nth-child(2) { animation-delay: 0.2s; }
    .typing span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes bounce {
      0%,60%,100% { transform: translateY(0); opacity: 0.4; }
      30% { transform: translateY(-6px); opacity: 1; }
    }

    /* ── Input ── */
    .input-area {
      padding: 14px 24px 18px;
      border-top: 1px solid var(--border);
      background: var(--surface);
      flex-shrink: 0;
    }
    .input-row { display: flex; gap: 10px; align-items: flex-end; max-width: 720px; margin: 0 auto; }
    #user-input {
      flex: 1;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 11px 14px;
      color: var(--text);
      font-family: 'Noto Serif TC', serif;
      font-size: 14px;
      resize: none;
      outline: none;
      min-height: 46px;
      max-height: 140px;
      line-height: 1.6;
      transition: border-color 0.2s;
    }
    #user-input:focus { border-color: var(--accent); }
    #user-input::placeholder { color: var(--muted); }
    #send-btn {
      width: 46px; height: 46px;
      border-radius: 10px;
      border: none;
      background: var(--accent);
      color: #0e0e10;
      font-size: 20px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
      flex-shrink: 0;
    }
    #send-btn:hover { transform: scale(1.05); }
    #send-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }
    .hint {
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      color: var(--muted);
      text-align: center;
      margin-top: 7px;
      max-width: 720px;
      margin-left: auto;
      margin-right: auto;
    }

    /* ── Responsive ── */
    @media (max-width: 600px) {
      header { padding: 10px 14px; gap: 8px; }
      .subject-tabs { display: flex; overflow-x: auto; -webkit-overflow-scrolling: touch; scrollbar-width: none; flex-shrink: 1; min-width: 0; }
      .subject-tabs::-webkit-scrollbar { display: none; }
      #chat { padding: 18px 14px; }
      .input-area { padding: 10px 14px 14px; }
      .welcome-title { font-size: 26px; }
    }
  </style>
</head>
<body>

<!-- Auth Modal -->
<div id="auth-modal">
  <div class="auth-card">
    <div class="logo">Pin<span>point</span></div>
    <h2 id="auth-title">登入</h2>
    <p id="auth-desc">登入後學習記錄跨裝置同步，不怕換手機資料消失。</p>

    <button class="google-btn" onclick="signInWithGoogle()">
      <svg width="16" height="16" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
      用 Google 帳號登入
    </button>

    <div class="divider">或</div>

    <input class="auth-input" type="email" id="auth-email" placeholder="Email" />
    <input class="auth-input" type="password" id="auth-password" placeholder="密碼（至少6位）" />
    <div class="auth-error" id="auth-error"></div>

    <button class="auth-btn" id="auth-main-btn" onclick="handleAuth()">登入</button>
    <div class="auth-switch" id="auth-switch">
      還沒有帳號？<a onclick="toggleAuthMode()">立即註冊</a>
    </div>
  </div>
</div>

<!-- Header -->
<header>
  <div class="logo">Pin<span>point</span></div>
  <div class="subject-tabs">
    <button class="tab active">社會</button>
    <button class="tab">自然</button>
    <button class="tab">國文</button>
    <button class="tab">英文</button>
    <button class="tab">數學</button>
  </div>
  <div class="header-right">
    <a href="https://sundancer57.gumroad.com/l/uvdbv" target="_blank" class="subscribe-btn" id="subscribe-btn">✦ 升級會員</a>
    <button class="user-btn" id="user-btn" onclick="handleUserBtn()">登出</button>
  </div>
</header>

<!-- Chat -->
<div id="chat"></div>

<!-- Input -->
<div class="input-area">
  <div class="input-row">
    <textarea id="user-input" placeholder="輸入主題或問題..." rows="1"></textarea>
    <button id="send-btn" onclick="sendMessage()">↑</button>
  </div>
  <div class="hint">
    <span id="usage-counter"></span>　·　Enter 送出 · Shift+Enter 換行
  </div>
</div>

<!-- Firebase -->
<script type="module" src="script.js"></script>
</body>
</html>
