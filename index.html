<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pinpoint — 高中學測備考</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0e0e10;
      --surface: #16161a;
      --surface2: #1e1e24;
      --border: #2a2a35;
      --accent: #c8f060;
      --accent2: #7b61ff;
      --text: #e8e6df;
      --muted: #7a7880;
      --user-bubble: #1e2a14;
      --ai-bubble: #1a1a22;
      --tag-bg: #1e1e24;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Noto Serif TC', serif;
      background: var(--bg);
      color: var(--text);
      height: 100dvh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* Header */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 24px;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
      flex-shrink: 0;
    }

    .logo {
      font-size: 18px;
      font-weight: 600;
      letter-spacing: 0.04em;
      color: var(--accent);
    }

    .logo span { color: var(--text); }

    .subject-tabs {
      display: flex;
      gap: 8px;
    }

    .tab {
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      padding: 4px 10px;
      border-radius: 20px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--muted);
      cursor: pointer;
      transition: all 0.2s;
    }

    .tab:hover, .tab.active {
      border-color: var(--accent);
      color: var(--accent);
      background: rgba(200, 240, 96, 0.06);
    }

    .version-badge {
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      padding: 3px 8px;
      border-radius: 4px;
      background: var(--surface2);
      color: var(--muted);
      border: 1px solid var(--border);
    }

    /* Chat area */
    #chat {
      flex: 1;
      overflow-y: auto;
      padding: 28px 24px;
      display: flex;
      flex-direction: column;
      gap: 20px;
      scroll-behavior: smooth;
    }

    #chat::-webkit-scrollbar { width: 4px; }
    #chat::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    /* Welcome screen */
    #welcome {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      flex: 1;
      gap: 32px;
      text-align: center;
      padding: 40px;
      animation: fadeUp 0.5s ease;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .welcome-title {
      font-size: 36px;
      font-weight: 600;
      line-height: 1.2;
      color: var(--text);
    }

    .welcome-title .hl { color: var(--accent); }

    .welcome-sub {
      font-size: 15px;
      color: var(--muted);
      max-width: 420px;
      line-height: 1.7;
    }

    .quick-topics {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      justify-content: center;
      max-width: 520px;
    }

    .quick-topic {
      font-size: 13px;
      padding: 8px 16px;
      border-radius: 20px;
      border: 1px solid var(--border);
      background: var(--surface2);
      color: var(--text);
      cursor: pointer;
      transition: all 0.2s;
    }

    .quick-topic:hover {
      border-color: var(--accent);
      color: var(--accent);
      transform: translateY(-2px);
    }

    /* Message bubbles */
    .msg {
      display: flex;
      flex-direction: column;
      gap: 6px;
      animation: fadeUp 0.3s ease;
      max-width: 720px;
      width: 100%;
      align-self: center;
    }

    .msg-label {
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      color: var(--muted);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      padding: 0 4px;
    }

    .msg.user .msg-label { text-align: right; }

    .bubble {
      padding: 16px 20px;
      border-radius: 12px;
      font-size: 15px;
      line-height: 1.8;
      white-space: pre-wrap;
      border: 1px solid var(--border);
    }

    .msg.user .bubble {
      background: var(--user-bubble);
      border-color: rgba(200, 240, 96, 0.2);
      align-self: flex-end;
      max-width: 85%;
    }

    .msg.ai .bubble {
      background: var(--ai-bubble);
      align-self: flex-start;
      width: 100%;
    }

    /* Question highlight */
    .question-box {
      margin-top: 12px;
      padding: 14px 18px;
      border-radius: 8px;
      border-left: 3px solid var(--accent);
      background: rgba(200, 240, 96, 0.04);
      font-size: 14px;
      line-height: 1.7;
      color: var(--text);
    }

    /* Typing indicator */
    .typing {
      display: flex;
      gap: 6px;
      padding: 18px 20px;
      background: var(--ai-bubble);
      border: 1px solid var(--border);
      border-radius: 12px;
      width: fit-content;
    }

    .typing span {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: var(--muted);
      animation: bounce 1.2s infinite;
    }
    .typing span:nth-child(2) { animation-delay: 0.2s; }
    .typing span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes bounce {
      0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
      30% { transform: translateY(-6px); opacity: 1; }
    }

    /* Input area */
    .input-area {
      padding: 16px 24px 20px;
      border-top: 1px solid var(--border);
      background: var(--surface);
      flex-shrink: 0;
    }

    .input-row {
      display: flex;
      gap: 10px;
      align-items: flex-end;
      max-width: 720px;
      margin: 0 auto;
    }

    #user-input {
      flex: 1;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px 16px;
      color: var(--text);
      font-family: 'Noto Serif TC', serif;
      font-size: 14px;
      resize: none;
      outline: none;
      min-height: 48px;
      max-height: 140px;
      line-height: 1.6;
      transition: border-color 0.2s;
    }

    #user-input:focus { border-color: var(--accent); }
    #user-input::placeholder { color: var(--muted); }

    #send-btn {
      width: 48px; height: 48px;
      border-radius: 10px;
      border: none;
      background: var(--accent);
      color: #0e0e10;
      font-size: 20px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
      flex-shrink: 0;
    }

    #send-btn:hover { transform: scale(1.05); }
    #send-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

    .hint {
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      color: var(--muted);
      text-align: center;
      margin-top: 8px;
      max-width: 720px;
      margin-left: auto;
      margin-right: auto;
    }

    /* API key setup */
    #api-setup {
      position: fixed;
      inset: 0;
      background: rgba(14,14,16,0.95);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 100;
      backdrop-filter: blur(4px);
    }

    .setup-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 36px;
      max-width: 420px;
      width: 90%;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .setup-card h2 {
      font-size: 20px;
      font-weight: 600;
      color: var(--accent);
    }

    .setup-card p {
      font-size: 14px;
      color: var(--muted);
      line-height: 1.7;
    }

    .setup-card input {
      width: 100%;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 12px 14px;
      color: var(--text);
      font-family: 'DM Mono', monospace;
      font-size: 13px;
      outline: none;
    }

    .setup-card input:focus { border-color: var(--accent); }

    .setup-card button {
      width: 100%;
      padding: 12px;
      border-radius: 8px;
      border: none;
      background: var(--accent);
      color: #0e0e10;
      font-family: 'Noto Serif TC', serif;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s;
    }

    .setup-card button:hover { opacity: 0.88; }

    /* CEEC 歷屆題連結 */
    .ceec-box {
      margin-top: 12px;
      padding: 14px 18px;
      border-radius: 8px;
      border-left: 3px solid var(--accent2);
      background: rgba(123, 97, 255, 0.06);
      font-size: 14px;
      line-height: 1.8;
      color: var(--text);
    }

    .ceec-link {
      color: var(--accent2);
      text-decoration: underline;
      word-break: break-all;
    }

    .ceec-link:hover { opacity: 0.8; }

    /* Responsive */
    @media (max-width: 600px) {
      header { padding: 12px 16px; }
      .subject-tabs { display: none; }
      #chat { padding: 20px 16px; }
      .input-area { padding: 12px 16px 16px; }
      .welcome-title { font-size: 26px; }
    }
  </style>
</head>
<body>

<!-- API Key Setup Modal -->
<div id="api-setup">
  <div class="setup-card">
    <h2>設定 API Key</h2>
    <p>請輸入你的 Anthropic API Key 才能開始使用。Key 只存在你的瀏覽器，不會上傳到任何伺服器。</p>
    <input type="password" id="api-key-input" placeholder="sk-ant-..." />
    <button onclick="saveApiKey()">開始使用</button>
  </div>
</div>

<!-- Header -->
<header>
  <div class="logo">Pin<span>point</span></div>
  <div class="subject-tabs">
    <button class="tab active">社會</button>
    <button class="tab">自然</button>
    <button class="tab">國文</button>
    <button class="tab">英文</button>
    <button class="tab">數學</button>
  </div>
  <div class="version-badge">高中版 · 學測 / 分科</div>
</header>

<!-- Chat -->
<div id="chat"></div>

<!-- Input -->
<div class="input-area">
  <div class="input-row">
    <textarea id="user-input" placeholder="輸入主題或問題..." rows="1"></textarea>
    <button id="send-btn" onclick="sendMessage()">↑</button>
  </div>
  <div class="hint">Enter 送出 · Shift+Enter 換行</div>
</div>

<script src="script.js"></script>
</body>
</html>
